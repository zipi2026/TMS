<div class="users-container">
  <mat-card class="users-card">
    <mat-card-header>
      <div class="header-content">
        <div class="title-section">
          <mat-icon class="title-icon">people</mat-icon>
          <div>
            <mat-card-title>ניהול משתמשים</mat-card-title>
            <mat-card-subtitle>הוספה, צפייה ומחיקת משתמשים במערכת</mat-card-subtitle>
          </div>
        </div>
        <button mat-flat-button color="primary" (click)="openAddUserDialog()">
          <mat-icon>person_add</mat-icon>
          <span>הוסף משתמש</span>
        </button>
      </div>
    </mat-card-header>

    <mat-card-content>
      <!-- Loading spinner -->
      <div class="loading-container" *ngIf="isLoading">
        <mat-spinner diameter="40"></mat-spinner>
      </div>

      <!-- Empty state -->
      <div class="empty-state" *ngIf="!isLoading && dataSource.data.length === 0">
        <mat-icon>group_off</mat-icon>
        <p>אין משתמשים במערכת</p>
        <button mat-stroked-button color="primary" (click)="openAddUserDialog()">
          הוסף משתמש ראשון
        </button>
      </div>

      <!-- Users table -->
      <div class="table-wrapper" *ngIf="!isLoading && dataSource.data.length > 0">
        <table mat-table [dataSource]="dataSource" matSort class="users-table">

          <!-- ID Column -->
          <ng-container matColumnDef="userId">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>מזהה</th>
            <td mat-cell *matCellDef="let user">
              <span class="id-badge">#{{ user.userId }}</span>
            </td>
          </ng-container>

          <!-- Name Column -->
          <ng-container matColumnDef="userName">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>שם משתמש</th>
            <td mat-cell *matCellDef="let user">
              <div class="user-cell">
                <div class="user-avatar-small">{{ user.userName?.charAt(0)?.toUpperCase() }}</div>
                <span>{{ user.userName }}</span>
              </div>
            </td>
          </ng-container>

          <!-- Email Column -->
          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef>אימייל</th>
            <td mat-cell *matCellDef="let user">{{ user.email || '-' }}</td>
          </ng-container>

          <!-- Phone Column -->
          <ng-container matColumnDef="phone">
            <th mat-header-cell *matHeaderCellDef>טלפון</th>
            <td mat-cell *matCellDef="let user">{{ user.phone || '-' }}</td>
          </ng-container>

          <!-- Role Column -->
          <ng-container matColumnDef="roleId">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>תפקיד</th>
            <td mat-cell *matCellDef="let user">
              <span class="role-chip" [class.admin]="user.roleId === 2" [class.standard]="user.roleId === 1">
                {{ getRoleName(user.roleId) }}
              </span>
            </td>
          </ng-container>

          <!-- Actions Column -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>פעולות</th>
            <td mat-cell *matCellDef="let user">
              <button mat-icon-button color="warn" (click)="deleteUser(user)" matTooltip="מחק משתמש">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

        <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons></mat-paginator>
      </div>
    </mat-card-content>
  </mat-card>
</div>
