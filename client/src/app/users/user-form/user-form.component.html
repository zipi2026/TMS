<h2 mat-dialog-title class="dialog-title">
  <mat-icon>person_add</mat-icon>
  <span>הוספת משתמש חדש</span>
</h2>

<mat-dialog-content>
  <form [formGroup]="formGroup" (keydown.enter)="onSubmit()">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>שם משתמש</mat-label>
      <input matInput formControlName="userName" placeholder="הכנס שם משתמש">
      <mat-icon matPrefix>person</mat-icon>
      <mat-error *ngIf="formGroup.get('userName')?.hasError('required')">שם משתמש חובה</mat-error>
      <mat-error *ngIf="formGroup.get('userName')?.hasError('minlength')">לפחות 3 תווים</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>סיסמה</mat-label>
      <input matInput type="password" formControlName="password" placeholder="הכנס סיסמה">
      <mat-icon matPrefix>lock</mat-icon>
      <mat-error *ngIf="formGroup.get('password')?.hasError('required')">סיסמה חובה</mat-error>
      <mat-error *ngIf="formGroup.get('password')?.hasError('minlength')">לפחות 4 תווים</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>אימייל</mat-label>
      <input matInput formControlName="email" placeholder="example@email.com">
      <mat-icon matPrefix>email</mat-icon>
      <mat-error *ngIf="formGroup.get('email')?.hasError('email')">אימייל לא תקין</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>טלפון</mat-label>
      <input matInput formControlName="phone" placeholder="050-0000000">
      <mat-icon matPrefix>phone</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>תפקיד</mat-label>
      <mat-select formControlName="roleId">
        <mat-option [value]="1">משתמש רגיל</mat-option>
        <mat-option [value]="2">מנהל</mat-option>
      </mat-select>
      <mat-icon matPrefix>badge</mat-icon>
    </mat-form-field>

    <div class="error-message" *ngIf="errorMessage">
      <mat-icon>error_outline</mat-icon>
      <span>{{ errorMessage }}</span>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="close()">ביטול</button>
  <button mat-flat-button color="primary" (click)="onSubmit()" [disabled]="formGroup.invalid || isLoading">
    <mat-spinner diameter="18" *ngIf="isLoading"></mat-spinner>
    <span *ngIf="!isLoading">הוסף משתמש</span>
  </button>
</mat-dialog-actions>
