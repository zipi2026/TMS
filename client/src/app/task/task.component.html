<!-- ===== TASK CARD — Modern card design ===== -->
<div class="task-card" [class]="statusClass">
  <!-- Colored status bar at top -->
  <div class="card-status-bar"></div>

  <div class="card-body">
    <!-- Header: ID + Status badge -->
    <div class="card-header">
      <span class="task-id">#{{ task.taskId }}</span>
      <span class="task-status-badge" [class]="statusClass">
        {{ statusLabel }}
      </span>
    </div>

    <!-- Task name -->
    <h3 class="task-name">{{ task.name }}</h3>

    <!-- Description -->
    <p class="task-description">{{ task.description }}</p>

    <!-- Footer: meta + big status icon -->
    <div class="card-footer">
      <div class="task-meta">
        <div class="meta-item">
          <mat-icon>calendar_today</mat-icon>
          <span>{{ task.scheduling | date:'dd/MM/yyyy' }}</span>
        </div>
        <div class="meta-item">
          <mat-icon>attach_money</mat-icon>
          <span>{{ task.price | number }}</span>
        </div>
      </div>
      <mat-icon class="status-big-icon">{{ task.status | statusIcon }}</mat-icon>
    </div>
  </div>
</div>
