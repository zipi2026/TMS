<!-- ===== TABLE VIEW — Modern Material table ===== -->
<mat-card class="table-card">
  <div class="table-wrapper">
    <mat-table [dataSource]="taskList" class="tasks-table">

      <!-- Dynamic columns -->
      <ng-container *ngFor="let column of columns" [matColumnDef]="column">
        <mat-header-cell *matHeaderCellDef>
          <span [innerText]="column"></span>
        </mat-header-cell>

        <mat-cell *matCellDef="let element">
          <!-- Status column -->
          @if (column === 'status') {
            <div class="status-cell">
              <mat-icon class="status-icon">{{ element[column] | statusIcon }}</mat-icon>
              <span [innerText]="element[column] | hebrew"></span>
            </div>
          }
          <!-- Update column -->
          @else if (column === 'UPDATE') {
            <button mat-icon-button color="primary" (click)="changeTask(element)" matTooltip="עריכת משימה">
              <mat-icon>edit</mat-icon>
            </button>
          }
          <!-- Date columns -->
          @else if (column === 'date' || column === 'scheduling') {
            <span>{{ element[column] | date:'dd/MM/yyyy' }}</span>
          }
          <!-- Other columns -->
          @else {
            <span [innerText]="element[column]"></span>
          }
        </mat-cell>
      </ng-container>

      <mat-header-row *matHeaderRowDef="columns"></mat-header-row>
      <mat-row *matRowDef="let row; columns: columns;"></mat-row>
    </mat-table>
  </div>

  <!-- Empty state -->
  <div class="empty-table" *ngIf="taskList.length === 0">
    <mat-icon>inbox</mat-icon>
    <span>אין משימות להצגה</span>
  </div>
</mat-card>
