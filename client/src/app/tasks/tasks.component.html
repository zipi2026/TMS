<!-- ===== TASKS PAGE — Modern header + content area ===== -->
<div class="tasks-container animate-fade-in">

  <!-- Page Header Card -->
  <mat-card class="page-header-card">
    <div class="header-content">
      <div class="header-title-section">
        <div class="title-icon-wrapper">
          <mat-icon>assignment</mat-icon>
        </div>
        <div>
          <h1 class="page-title">לוח משימות</h1>
          <p class="page-subtitle">ניהול ומעקב אחר המשימות שלך</p>
        </div>
      </div>

      <div class="header-actions">
        <!-- View toggle -->
        <mat-button-toggle-group
          [value]="viewState"
          (change)="changeState()"
          class="view-toggle"
          hideSingleSelectionIndicator>
          <mat-button-toggle [value]="ViewMode.Dashboard" matTooltip="תצוגת כרטיסיות">
            <mat-icon>dashboard</mat-icon>
          </mat-button-toggle>
          <mat-button-toggle [value]="ViewMode.Table" matTooltip="תצוגת טבלה">
            <mat-icon>table_chart</mat-icon>
          </mat-button-toggle>
        </mat-button-toggle-group>

        <!-- Status filter -->
        <mat-form-field appearance="outline" class="status-filter">
          <mat-label>סינון לפי סטטוס</mat-label>
          <mat-select [(ngModel)]="status">
            <mat-option [value]="-1">הכל</mat-option>
            <mat-option [value]="0">ממתין</mat-option>
            <mat-option [value]="1">בתהליך</mat-option>
            <mat-option [value]="2">הושלם</mat-option>
            <mat-option [value]="3">מבוטל</mat-option>
          </mat-select>
        </mat-form-field>

        <!-- Add task button -->
        <button mat-flat-button class="add-task-btn" (click)="addTask()">
          <mat-icon>add</mat-icon>
          <span>הוסף משימה</span>
        </button>
      </div>
    </div>
  </mat-card>

  <!-- Content section -->
  <section class="tasks-content">
    <div *ngIf="viewState === ViewMode.Dashboard" class="dashboard-view">
      <app-dashboard [taskList]="((taskList$ | async) || []) | filter:status"></app-dashboard>
    </div>

    <div *ngIf="viewState === ViewMode.Table" class="table-view">
      <app-table [taskList]="((taskList$ | async) || []) | filter:status" (taskChanged)="loadTasks()"></app-table>
    </div>
  </section>

  <!-- Chat widget -->
  <app-chat></app-chat>
</div>
